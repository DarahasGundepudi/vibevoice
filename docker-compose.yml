# ─────────────────────────────────────────────────────────────────────────────
# VibeVoice AI Audio Engine — Docker Compose
# ─────────────────────────────────────────────────────────────────────────────
# Usage:
#   docker compose up --build
#
# Requires: Docker with NVIDIA Container Toolkit
#   https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
# ─────────────────────────────────────────────────────────────────────────────

services:
  vibevoice-engine:
    build: .
    container_name: vibevoice-ai-engine
    ports:
      - "${PORT:-8000}:8000"
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      # Persist HuggingFace cache on host (fallback for any runtime downloads)
      - vibevoice-hf-cache:/root/.cache/huggingface
      # Persist podcast outputs
      - vibevoice-podcasts:/tmp/vibevoice_podcasts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 180s
      retries: 3
    # Increase shared memory for PyTorch DataLoader / multi-worker inference
    shm_size: "4gb"

volumes:
  vibevoice-hf-cache:
  vibevoice-podcasts:
